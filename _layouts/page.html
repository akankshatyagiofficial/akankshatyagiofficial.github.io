<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} - {{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body class="home-body">
  <header class="main-header">
    <div class="container nav-container">
      <div class="logo">VONGE</div>
      <nav>
        <ul class="main-nav">
          <li><a href="/" {% if page.url == '/' %}class="active"{% endif %}>Home</a></li>
          <li><a href="/projects/" {% if page.url == '/projects/' %}class="active"{% endif %}>Projects</a></li>
          <li><a href="#">Blog</a></li>
          <li><a href="/about/" {% if page.url == '/about/' %}class="active"{% endif %}>About</a></li>
        </ul>
      </nav>
      <div class="social-icons">
        <a href="#"><span class="icon">&#xf099;</span></a>
        <a href="#"><span class="icon">&#xf09a;</span></a>
        <a href="#"><span class="icon">&#xf231;</span></a>
        <a href="#"><span class="icon">&#xf16d;</span></a>
      </div>
    </div>
  </header>
  <main class="container page-content">
    <h1>{{ page.title }}</h1>
    {{ content }}
  </main>
</body>
</html>
